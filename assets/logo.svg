<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="codeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#bgGrad)" filter="url(#shadow)"/>
  
  <!-- Inner glow circle -->
  <circle cx="128" cy="128" r="100" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  
  <!-- Terminal window -->
  <rect x="48" y="70" width="160" height="116" rx="12" ry="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Terminal header bar -->
  <rect x="48" y="70" width="160" height="24" rx="12" ry="12" fill="#16213e"/>
  <rect x="48" y="82" width="160" height="12" fill="#16213e"/>
  
  <!-- Terminal buttons -->
  <circle cx="68" cy="82" r="5" fill="#ff6b6b"/>
  <circle cx="84" cy="82" r="5" fill="#ffd93d"/>
  <circle cx="100" cy="82" r="5" fill="#6bcb77"/>
  
  <!-- Code lines with gradient -->
  <g filter="url(#glow)">
    <!-- Line 1 - prompt -->
    <text x="60" y="118" font-family="Monaco, 'Courier New', monospace" font-size="11" fill="#00d9ff">❯</text>
    <rect x="75" y="108" width="80" height="10" rx="2" fill="#00d9ff" opacity="0.7"/>
    
    <!-- Line 2 - code -->
    <text x="60" y="140" font-family="Monaco, 'Courier New', monospace" font-size="11" fill="#8b5cf6">def</text>
    <text x="85" y="140" font-family="Monaco, 'Courier New', monospace" font-size="11" fill="#f472b6">hello</text>
    <text x="116" y="140" font-family="Monaco, 'Courier New', monospace" font-size="11" fill="#e2e8f0">():</text>
    
    <!-- Line 3 - return -->
    <text x="72" y="158" font-family="Monaco, 'Courier New', monospace" font-size="11" fill="#8b5cf6">return</text>
    <rect x="115" y="148" width="65" height="10" rx="2" fill="#00ff88" opacity="0.7"/>
  </g>
  
  <!-- AI sparkle effects -->
  <g fill="#ffffff" opacity="0.8">
    <polygon points="200,50 203,56 210,56 205,61 207,68 200,64 193,68 195,61 190,56 197,56" transform="scale(0.6) translate(100, 20)"/>
    <polygon points="200,50 203,56 210,56 205,61 207,68 200,64 193,68 195,61 190,56 197,56" transform="scale(0.4) translate(-50, 350)"/>
    <polygon points="200,50 203,56 210,56 205,61 207,68 200,64 193,68 195,61 190,56 197,56" transform="scale(0.5) translate(280, 180)"/>
  </g>
  
  <!-- Orbiting dots representing AI -->
  <circle cx="50" cy="128" r="4" fill="#00d9ff" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="0 128 128" to="360 128 128" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="206" cy="128" r="3" fill="#00ff88" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="180 128 128" to="540 128 128" dur="8s" repeatCount="indefinite"/>
  </circle>
</svg>
